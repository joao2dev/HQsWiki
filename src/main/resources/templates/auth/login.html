<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1f1f, #2c3e50);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .form-container {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 6px 6px 0px #000, 0 15px 35px rgba(0,0,0,0.4);
            border: 3px solid #000;
            position: relative;
        }

        .badge {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #3498db;
            color: white;
            font-size: 13px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(15deg);
            box-shadow: 2px 2px 0 black;
        }

        .page-title {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }

        .form input:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52,152,219,0.4);
        }

        .form button {
            padding: 12px;
            border: 3px solid #000;
            border-radius: 8px;
            background-color: #2ecc71;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 4px 4px 0 #000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form button:hover {
            background-color: #27ae60;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
        }

        .form button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="badge">LOGIN</div>

    <h1 class="page-title">Entrar</h1>

    <form class="form" th:action="@{/auth/login}" method="post">
        <input type="email" name="email" placeholder="Email" required/>
        <input type="password" name="password" placeholder="Senha" required/>
        <button type="submit">⚡ Entrar</button>
    </form>

    <p class="register-link">
        Não tem conta? <a th:href="@{/auth/ui/registrar}">Cadastrar</a>
    </p>
    <p th:if="${param.erro}" style="color: red; text-align: center; margin-bottom: 10px;">
        Email ou senha inválidos.
    </p>
</div>

</body>
</html>
