services:
  db:
    image: postgres:16
    container_name: hqswiki-db
    environment:
      POSTGRES_DB: projetohq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p3rd1d0
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: hqswiki-app
